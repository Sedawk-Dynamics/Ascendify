resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    # Frontend (Next.js)
    location / {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Backend API - keep /api/ prefix (backend routes expect it)
    location /api/ {
        set $backend http://backend:5002;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend uploads
    location /uploads/ {
        set $backend_uploads http://backend:5002;
        proxy_pass $backend_uploads;
        proxy_set_header Host $host;
    }

    # Admin panel (Vite + React)
    location /admin/ {
        set $admin http://admin:80;
        proxy_pass $admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }
}
