resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;

    # Frontend (Next.js)
    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Backend API - full URI is passed (includes /api/ prefix)
    location /api/ {
        set $upstream_backend http://backend:5002;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend uploads
    location /uploads/ {
        set $upstream_backend_uploads http://backend:5002;
        proxy_pass $upstream_backend_uploads;
        proxy_set_header Host $host;
    }

    # Admin panel (Vite + React) - strip /admin/ prefix via rewrite
    location /admin/ {
        set $upstream_admin http://admin:80;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass $upstream_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }
}
