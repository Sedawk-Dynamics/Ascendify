upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:5002;
}

upstream admin {
    server admin:80;
}

server {
    listen 80;
    server_name _;

    # ========================
    # BACKEND API
    # ========================
    location /api/ {
        proxy_pass http://backend/;   # ✅ FIXED
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # UPLOADS
    # ========================
    location /uploads/ {
        proxy_pass http://backend/uploads/;
        proxy_set_header Host $host;
    }

    # ========================
    # ADMIN PANEL
    # ========================
    location /admin/ {
        proxy_pass http://admin/;   # works with trailing slash
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: handle /admin without trailing slash
    location = /admin {
        return 301 /admin/;
    }

    # ========================
    # FRONTEND (NEXT.JS)
    # ========================
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}