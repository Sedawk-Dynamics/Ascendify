services:
  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=5002
      - JWT_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    depends_on:
      - frontend
      - backend
      - admin
    restart: unless-stopped

volumes:
  uploads:
