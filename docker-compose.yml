services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - admin
    restart: unless-stopped