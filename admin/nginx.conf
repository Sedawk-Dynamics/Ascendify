server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Traefik sends full path with /admin/ prefix - strip it
    location /admin/ {
        rewrite ^/admin/(.*) /$1 last;
    }

    location /admin {
        return 301 /admin/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
